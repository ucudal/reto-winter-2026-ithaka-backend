name: ithaka-backend

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ithaka-backend:local
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ithaka}:${POSTGRES_PASSWORD:-ithaka}@db:5432/${POSTGRES_DB:-ithaka}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').status == 200 else 1)"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ithaka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ithaka}
      POSTGRES_DB: ${POSTGRES_DB:-ithaka}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ithaka}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
