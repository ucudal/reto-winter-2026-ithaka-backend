name: ithaka-backend

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ithaka-backend:local
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').status == 200 else 1)"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

