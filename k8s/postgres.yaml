# PostgreSQL para el backend, dentro del namespace ithaka-backend.
# El Secret con las credenciales está en postgres-secret.yaml (gitignoreado).
# Copiá postgres-secret.example.yaml -> postgres-secret.yaml y completá los valores.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ithaka-db-pvc
  namespace: ithaka-backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ithaka-db
  namespace: ithaka-backend
  labels:
    app: ithaka-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ithaka-db
  template:
    metadata:
      labels:
        app: ithaka-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: ithaka-db-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "250Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command:
                ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ithaka-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ithaka-db
  namespace: ithaka-backend
spec:
  type: ClusterIP
  selector:
    app: ithaka-db
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
