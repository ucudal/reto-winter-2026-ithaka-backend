# Plantilla del Secret de Postgres. Copiá a postgres-secret.yaml y completá los valores.
# postgres-secret.yaml está gitignoreado (nunca se commitea con valores reales).
#
# Alternativa recomendada: crear el Secret directo en el cluster, sin archivo:
#   kubectl create secret generic ithaka-db-secret -n ithaka-backend \
#     --from-literal=POSTGRES_USER=<USER> \
#     --from-literal=POSTGRES_PASSWORD=<PASSWORD> \
#     --from-literal=POSTGRES_DB=<DB>
apiVersion: v1
kind: Secret
metadata:
  name: ithaka-db-secret
  namespace: ithaka-backend
type: Opaque
stringData:
  POSTGRES_USER: "<USER>"
  POSTGRES_PASSWORD: "<PASSWORD>"
  POSTGRES_DB: "<DB>"
