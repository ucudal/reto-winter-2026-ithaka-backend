apiVersion: apps/v1
kind: Deployment
metadata:
  name: ithaka-backend
  namespace: ithaka-backend
  labels:
    app: ithaka-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ithaka-backend
  template:
    metadata:
      labels:
        app: ithaka-backend
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: backend
          image: crretoxmas2024.azurecr.io/ithaka-backend:test-92a0ac3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ithaka-backend-config
            - secretRef:
                name: ithaka-backend-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "250Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
