# Plantilla del Secret del backend. Copiá a secret.yaml y completá los valores reales.
# secret.yaml está gitignoreado (nunca se commitea con valores reales).
#
# La base de datos es externa (gestionada por la cátedra):
#   - Desde el cluster:  host 10.0.3.7        puerto 50003
#   - Desde afuera:      host postgres.reto-ucu.net  puerto 50003
#
# Alternativa recomendada: crear el Secret directo en el cluster, sin archivo:
#   kubectl create secret generic ithaka-backend-secrets -n ithaka-backend \
#     --from-literal=DATABASE_URL='postgresql+psycopg://USER:PASS@10.0.3.7:50003/DB' \
#     --from-literal=SECRET_KEY="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: ithaka-backend-secrets
  namespace: ithaka-backend
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://<USER>:<PASSWORD>@10.0.3.7:50003/<DB>"
  SECRET_KEY: "<GENERAR_CON_openssl_rand_hex_32>"
